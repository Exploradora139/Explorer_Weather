<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="src/style.css" />
    <title>Explorer Weather App</title>
  </head>
  <body>
    <div class="weather-app">
      <header>
        <form>
          <input
            type="search"
            placeholder="Enter a city..."
            required
            id="search-input"
            class="search-input"
          />
          <input
            type="submit"
            value="Search"
            id="search-button"
            class="search-button"
          />
        </form>
      </header>
      <main>
        <div class="weather-app-data">
          <div>
            <h1 id="city">Mexico City</h1>
            <p>
              <span id="time">Tuesday 10:00</span>,
              <span id="description"> Cloudy</span>
              <br />
              Humidity:
              <strong id="humidity">72</strong>, Wind:
              <strong id="wind-speed">13mph</strong>
            </p>
          </div>
          <div class="weather-app-temperature-info">
            <div id="icon">&#9729;</div>
            <div class="weather-app-temperature" id="temperature">72</div>
            <div class="weather-app-unit">°F</div>
          </div>
        </div>
      </main>

      <footer>
        Coded by
        <a href="https://github.com/Exploradora139" target="_blank">
          Dora Lopez
        </a>
        ,
        <a
          href="https://github.com/Exploradora139/Explorer_Weather"
          target="_blank"
        >
          open-sourced on GitHub
        </a>
        and Website hosted
        <a href="https://explorerweather.netlify.app/" target="_blank">
          on Netlify
        </a>
      </footer>
    </div>
  </body>
</html>
