<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="src/style.css" />
    <title>Explorer Weather App</title>
  </head>
  <body>
    <header>
      <form>
        <input
          type="search"
          id="search-input"
          placeholder="Enter a city..."
          required
        />
        <input type="submit" id="search-button" value="Search" />
      </form>
    </header>
    <main>
      <div>
        <h1>Mexico City</h1>
        <p>
          Tuesday 10:00, cloudy
          <br />
          Humidity:
          <strong id="humidity">72</strong>, Wind:
          <strong id="wind-speed">13mph</strong>
        </p>
      </div>
      <div class="weather-temperature">
        <div id="icon">&#9729;</div>
        <div class="weather-temperature" id="temperature">72</div>
        <div class="weather-unit">°F</div>
      </div>
    </main>

    <footer>
      Coded by
      <a href="https://github.com/Exploradora139" target="_blank">
        Dora Lopez
      </a>
      ,
      <a
        href="https://github.com/Exploradora139/Explorer_Weather"
        target="_blank"
      >
        open-sourced on GitHub
      </a>
      and Website hosted
      <a href="https://explorerweather.netlify.app/" target="_blank">
        on Netlify
      </a>
    </footer>
  </body>
</html>
